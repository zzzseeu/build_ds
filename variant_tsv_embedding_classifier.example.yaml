tsv_path: uniontest_2.txt
vcf_path: filtered.vcf.gz
fasta_path: ../rawdata/msu.all.fasta
outdir: ./embedding_anno_test

k: 500

embedder_type: agront
model_name_or_path: InstaDeepAI/agro-nucleotide-transformer-1b
device: cuda
pooling: mean
local_files_only: true

task_type: binary
feature_type: alt
model_type: logistic_regression
eval_mode: holdout
test_size: 0.2
cv_folds: 5
random_state: 42
min_class_size: 10

# 可选：仅保留指定类别，多个类别用英文逗号分隔
selected_classes: null

# 二分类时可选：指定正类名称
positive_class: null

class_weight: balanced

# 线性模型如 logistic_regression 建议开启
standardize_features: true
